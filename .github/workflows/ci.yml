name: ci

on:
  push:
  pull_request:

jobs:
  check-defs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      # Static validation of the Dagster definitions — the same fast check you run
      # locally before every reload/commit.
      - name: dg check defs
        run: uv run dg check defs

      # Smoke-test the benchmark harness: no live deployment in CI, so it reports an
      # empty footprint, but this catches import/regression errors in bench.py.
      - name: bench harness smoke test
        run: uv run python benchmarks/bench.py --label ci --no-import

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
